name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild -scheme AWPicsumServices-Package \
            -destination "generic/platform=iOS Simulator" \
            build

      - name: Test
        run: |
          SIM=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys;devs=[d for ds in json.load(sys.stdin)['devices'].values() for d in ds if d.get('isAvailable') and 'iPhone' in d.get('name','')];print(devs[0]['udid'])")
          xcodebuild -scheme AWPicsumServices-Package \
            -destination "platform=iOS Simulator,id=$SIM" \
            -only-testing:AWPicsumServicesTests \
            test
